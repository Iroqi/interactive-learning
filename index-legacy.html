<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>建站全流程仿真学习平台</title>
  <style>
:root {
  --bg: #f5f7fa;
  --surface: #ffffff;
  --surface-2: #eef2f7;
  --text: #1f2937;
  --text-secondary: #6b7280;
  --primary: #2563eb;
  --primary-dark: #1d4ed8;
  --success: #16a34a;
  --warning: #f59e0b;
  --danger: #dc2626;
  --border: #d1d5db;
  --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
  --radius: 12px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
  background: var(--bg);
  color: var(--text);
}

#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow);
  z-index: 10;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo { font-size: 28px; }
.brand h1 { font-size: 20px; margin: 0; }

.progress-area {
  width: 320px;
}

.progress-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
  font-size: 14px;
  color: var(--text-secondary);
}

.badges-display { display: flex; gap: 4px; }

.progress-bar {
  height: 8px;
  background: var(--surface-2);
  border-radius: 999px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), #3b82f6);
  transition: width 0.4s ease;
}

.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

.sidebar {
  width: 260px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 16px 0;
}

.step-nav {
  flex: 1;
  overflow-y: auto;
}

.step-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: background 0.2s;
  color: var(--text-secondary);
}

.step-item:hover { background: var(--bg); }

.step-item.active {
  background: #eff6ff;
  border-left-color: var(--primary);
  color: var(--primary);
  font-weight: 600;
}

.step-item.completed { color: var(--success); }

.step-number {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface-2);
  font-size: 13px;
  flex-shrink: 0;
}

.step-item.completed .step-number {
  background: var(--success);
  color: white;
}

.step-item.active .step-number {
  background: var(--primary);
  color: white;
}

.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
}

.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.step-header {
  padding: 24px 32px 0;
}

.step-header h2 { margin: 0 0 8px; font-size: 24px; }
.step-header p { margin: 0; color: var(--text-secondary); line-height: 1.6; }

.step-content {
  flex: 1;
  overflow-y: auto;
  padding: 24px 32px;
}

.knowledge-card {
  margin: 0 32px 16px;
  padding: 16px 20px;
  background: #eff6ff;
  border-left: 4px solid var(--primary);
  border-radius: var(--radius);
}

.knowledge-card.hidden { display: none; }

.knowledge-card h4 { margin: 0 0 8px; color: var(--primary-dark); }
.knowledge-card p { margin: 0; line-height: 1.6; }

.step-actions {
  display: flex;
  justify-content: space-between;
  padding: 16px 32px;
  background: var(--surface);
  border-top: 1px solid var(--border);
}

.btn {
  padding: 10px 20px;
  border-radius: 8px;
  border: 1px solid transparent;
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  transition: all 0.2s;
}

.btn-primary {
  background: var(--primary);
  color: white;
}
.btn-primary:hover { background: var(--primary-dark); }
.btn-primary:disabled { background: var(--border); cursor: not-allowed; }

.btn-secondary {
  background: var(--surface);
  border-color: var(--border);
  color: var(--text);
}
.btn-secondary:hover { background: var(--surface-2); }

.btn-ghost {
  background: transparent;
  border-color: var(--border);
  color: var(--text-secondary);
  width: 100%;
}
.btn-ghost:hover { background: var(--surface-2); }

.btn-success {
  background: var(--success);
  color: white;
}
.btn-success:hover { background: #15803d; }

.btn-warning {
  background: var(--warning);
  color: white;
}

/* Cards and panels */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px;
  margin-bottom: 20px;
}

.card h3 { margin-top: 0; font-size: 18px; }

.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

@media (max-width: 900px) {
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .sidebar { width: 200px; }
}

/* Form elements */
input, select, textarea {
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  width: 100%;
  font-family: inherit;
}

input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}

label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 14px; }

.check-label {
  display: flex !important;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  margin-bottom: 0;
  margin-top: 8px;
}
.check-label:first-child { margin-top: 0; }

.form-group { margin-bottom: 16px; }

/* Option cards */
.option-card {
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: all 0.2s;
}

.option-card:hover { border-color: var(--primary); }
.option-card.selected {
  border-color: var(--primary);
  background: #eff6ff;
}

.option-card h4 { margin: 0 0 6px; }
.option-card p { margin: 0; font-size: 13px; color: var(--text-secondary); }

/* Domain / DNS tables */
.table { width: 100%; border-collapse: collapse; }
.table th, .table td {
  padding: 10px 12px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}
.table th { background: var(--surface-2); font-weight: 600; font-size: 13px; }

/* Terminal */
.terminal {
  background: #111827;
  color: #e5e7eb;
  border-radius: var(--radius);
  padding: 16px;
  font-family: "SF Mono", Consolas, "Liberation Mono", monospace;
  font-size: 13px;
  min-height: 160px;
  overflow-y: auto;
}

.terminal .line { margin-bottom: 4px; }
.terminal .cmd { color: #60a5fa; }
.terminal .success { color: #34d399; }
.terminal .error { color: #f87171; }
.terminal .dim { color: #9ca3af; }

/* Browser mock */
.browser-mock {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--surface);
}

.browser-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
}

.browser-dots { display: flex; gap: 6px; }
.browser-dot { width: 10px; height: 10px; border-radius: 50%; }
.browser-dot.red { background: #ef4444; }
.browser-dot.yellow { background: #f59e0b; }
.browser-dot.green { background: #22c55e; }

.browser-address {
  flex: 1;
  background: white;
  border-radius: 6px;
  padding: 6px 12px;
  font-size: 13px;
  color: var(--text-secondary);
}

.browser-viewport {
  padding: 24px;
  min-height: 200px;
}

/* Tooltip */
.tooltip {
  position: relative;
  display: inline-block;
  border-bottom: 1px dashed var(--primary);
  color: var(--primary);
  cursor: help;
}

.tooltip::after {
  content: attr(data-tip);
  position: absolute;
  bottom: 125%;
  left: 50%;
  transform: translateX(-50%);
  background: #1f2937;
  color: white;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 12px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  z-index: 100;
}

.tooltip:hover::after { opacity: 1; }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: #1f2937;
  color: white;
  padding: 12px 20px;
  border-radius: 8px;
  box-shadow: var(--shadow);
  transition: opacity 0.3s, transform 0.3s;
  z-index: 1000;
}

.toast.hidden { opacity: 0; transform: translateY(20px); pointer-events: none; }

/* Animations */
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.pulse { animation: pulse 1.5s infinite; }

@keyframes slideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.slide-in { animation: slideIn 0.3s ease; }

/* Utility */
.hidden { display: none !important; }
.text-center { text-align: center; }
.mt-2 { margin-top: 12px; }
.mb-2 { margin-bottom: 12px; }
.flex { display: flex; }
.gap-2 { gap: 12px; }
.gap-1 { gap: 8px; }
.wrap { flex-wrap: wrap; }

.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 500;
  background: #dbeafe;
  color: var(--primary-dark);
}

.status-tag {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
}
.status-tag.success { background: #dcfce7; color: var(--success); }
.status-tag.pending { background: #fef3c7; color: #b45309; }
.status-tag.error { background: #fee2e2; color: var(--danger); }

.dns-propagation {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 12px;
  padding: 12px;
  background: var(--surface-2);
  border-radius: 8px;
}

.dns-node {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--border);
  transition: background 0.3s;
}

.dns-node.active { background: var(--success); }
  </style>
</head>

  <script>
(function () {
  const stepsConfig = window.SimData.stepsConfig;
  const knowledgeCards = window.SimData.knowledgeCards;
  const termDefinitions = window.SimData.termDefinitions;

  const state = {
    currentStep: 0,
    completedSteps: new Set(),
    siteType: null,
    techStack: null,
    siteName: '',
    siteTagline: '',
    siteColor: '#2563eb',
    domain: null,
    domainPrice: null,
    domainPurchased: false,
    hosting: null,
    hostingConfigured: false,
    serverIp: null,
    dnsRecords: [],
    dnsPropagated: false,
    sslEnabled: false,
    sslProvider: null,
    deployed: false,
    deployMethod: null,
    tested: false,
    badges: []
  };

  const stepModules = [];

  function registerStep(module) {
    stepModules[module.index] = module;
  }

  const STORAGE_KEY = 'website-simulation-progress';

  function saveState() {
    const data = {
      ...state,
      completedSteps: Array.from(state.completedSteps)
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function loadState() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    try {
      const data = JSON.parse(raw);
      Object.assign(state, data);
      state.completedSteps = new Set(data.completedSteps || []);
    } catch (e) {
      console.warn('Failed to load saved state', e);
    }
  }

  function resetState() {
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  }

  function completeStep(index) {
    state.completedSteps.add(index);
    renderNav();
    updateProgress();
    saveState();
  }

  function isStepComplete(index) {
    return state.completedSteps.has(index);
  }

  function goToStep(index) {
    if (index < 0 || index >= stepsConfig.length) return;
    state.currentStep = index;
    renderNav();
    renderStep();
    updateProgress();
    saveState();
  }

  function addBadge(badge) {
    if (!state.badges.includes(badge)) {
      state.badges.push(badge);
      renderBadges();
      showToast('获得徽章：' + badge);
      saveState();
    }
  }

  function renderBadges() {
    const el = document.getElementById('badges-display');
    if (!el) return;
    el.innerHTML = state.badges.map(function (b) { return '<span title="' + b + '">🏅</span>'; }).join('');
  }

  function updateProgress() {
    const count = state.completedSteps.size;
    const total = stepsConfig.length;
    const pct = Math.round((count / total) * 100);
    document.getElementById('progress-text').textContent = '进度 ' + count + '/' + total;
    document.getElementById('progress-fill').style.width = pct + '%';

    const nextBtn = document.getElementById('next-btn');
    if (state.currentStep === total - 1) {
      nextBtn.textContent = '完成学习';
    } else {
      nextBtn.textContent = '下一步';
    }

    const prevBtn = document.getElementById('prev-btn');
    prevBtn.disabled = state.currentStep === 0;
  }

  function renderNav() {
    const nav = document.getElementById('step-nav');
    nav.innerHTML = stepsConfig.map(function (step, idx) {
      const completed = state.completedSteps.has(idx);
      const active = idx === state.currentStep;
      const icon = completed ? '✓' : idx + 1;
      return '<div class="step-item ' + (active ? 'active' : '') + ' ' + (completed ? 'completed' : '') + '" data-index="' + idx + '">' +
        '<span class="step-number">' + icon + '</span>' +
        '<div class="step-info">' +
          '<div class="step-title">' + step.title + '</div>' +
          '<div class="step-subtitle" style="font-size:12px;color:#6b7280;">' + step.subtitle + '</div>' +
        '</div>' +
      '</div>';
    }).join('');

    nav.querySelectorAll('.step-item').forEach(function (item) {
      item.addEventListener('click', function () {
        goToStep(parseInt(item.dataset.index, 10));
      });
    });
  }

  function renderStep() {
    const config = stepsConfig[state.currentStep];
    const header = document.getElementById('step-header');
    header.innerHTML = '<h2>' + config.title + '</h2><p>' + config.description + '</p>';

    const content = document.getElementById('step-content');
    content.innerHTML = '';

    const mod = stepModules[state.currentStep];
    if (mod && mod.render) {
      mod.render(content);
    }

    const knowledge = document.getElementById('knowledge-card');
    knowledge.classList.add('hidden');

    updateProgress();
  }

  function showKnowledgeCard(stepId, extra) {
    extra = extra || '';
    const text = knowledgeCards[stepId] || '';
    const el = document.getElementById('knowledge-card');
    el.innerHTML = '<h4>💡 知识点</h4><p>' + text + (extra ? '<br><br>' + extra : '') + '</p>';
    el.classList.remove('hidden');
  }

  function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.remove('hidden');
    setTimeout(function () { toast.classList.add('hidden'); }, 3000);
  }

  function createElement(html) {
    const div = document.createElement('div');
    div.innerHTML = html.trim();
    return div.firstChild;
  }

  function renderTermTooltip(term) {
    return '<span class="tooltip" data-tip="' + getTermDefinition(term) + '">' + term + '</span>';
  }

  function getTermDefinition(term) {
    return termDefinitions[term] || '暂无解释';
  }

  function bindEvents() {
    document.getElementById('prev-btn').addEventListener('click', function () {
      goToStep(state.currentStep - 1);
    });
    document.getElementById('next-btn').addEventListener('click', function () {
      if (state.currentStep === stepsConfig.length - 1) {
        showToast('恭喜！你已经完成了建站全流程仿真学习 🎉');
        addBadge('🎓 建站大师');
        return;
      }
      goToStep(state.currentStep + 1);
    });
    document.getElementById('reset-btn').addEventListener('click', function () {
      if (confirm('确定要重置所有学习进度吗？')) {
        resetState();
      }
    });
  }

  function init() {
    loadState();
    renderNav();
    renderBadges();
    renderStep();
    bindEvents();
  }

  window.SimApp = {
    state: state,
    registerStep: registerStep,
    completeStep: completeStep,
    isStepComplete: isStepComplete,
    goToStep: goToStep,
    addBadge: addBadge,
    showToast: showToast,
    showKnowledgeCard: showKnowledgeCard,
    createElement: createElement,
    renderTermTooltip: renderTermTooltip,
    getTermDefinition: getTermDefinition,
    saveState: saveState,
    init: init
  };
})();
  </script>

        if (e.key === 'Enter') searchDomains();
      });

      document.getElementById('pay-domain').addEventListener('click', function () {
        var name = document.getElementById('registrant-name').value.trim();
        var email = document.getElementById('registrant-email').value.trim();
        if (!name || !email) {
          App.showToast('请填写完整的注册信息');

        renderCart();
      });

  });

  function searchDomains() {
    var keyword = document.getElementById('domain-keyword').value.trim().toLowerCase();
    if (!keyword) {
      App.showToast('请输入域名前缀');
      return;
    }

    var results = document.getElementById('domain-results');
    results.innerHTML = '<p class="pulse">正在查询域名可用性...</p>';

    setTimeout(function () {
      var tlds = Object.keys(domainPrices);
      var suggestions = tlds.map(function (tld) {
        return {
          name: keyword + '.' + tld,
          tld: tld,
          price: domainPrices[tld],
          available: Math.random() > 0.2 || tld === 'com'
        };
      });

      results.innerHTML =
        '<table class="table">' +
          '<thead><tr><th>域名</th><th>价格/年</th><th>状态</th><th>操作</th></tr></thead>' +

                '<td>¥' + d.price + '</td>' +

                '<td>' + (d.available ? '<button class="btn btn-primary add-to-cart" data-domain="' + d.name + '" data-price="' + d.price + '">加入购物车</button>' : '<button class="btn btn-secondary" disabled>不可用</button>') + '</td>' +
              '</tr>';
            }).join('') +
          '</tbody>' +
        '</table>';

        btn.addEventListener('click', function () {
          state.domain = btn.dataset.domain;
          state.domainPrice = parseInt(btn.dataset.price, 10);
          document.getElementById('cart-card').classList.remove('hidden');
          renderCart();
        });
      });
    }, 800);
  }

  function renderCart() {
    var cartContent = document.getElementById('cart-content');
    var checkout = document.getElementById('checkout-form');
    if (!state.domain) {
      cartContent.innerHTML = '<p>购物车是空的</p>';
      checkout.classList.add('hidden');
      return;
    }

    cartContent.innerHTML =
      '<p><strong>' + state.domain + '</strong> — ¥' + state.domainPrice + '/年 × 1 年</p>' +
      (state.domainPurchased ? '<span class="status-tag success">已注册</span>' : '');

    if (state.domainPurchased) {
      checkout.classList.add('hidden');
    } else {
      checkout.classList.remove('hidden');
    }
  }
})();

          '<h3>解析传播模拟</h3>' +
          '<p style="color:#6b7280;">DNS 修改后，全球各地的 DNS 服务器需要一段时间才能同步。点击下方按钮模拟传播过程。</p>' +
          '<div class="dns-propagation" id="dns-propagation">' + nodeSpans + '</div>' +
          '<button id="propagate-dns" class="btn btn-warning mt-2" disabled>开始解析传播</button>' +
          '<p id="propagation-status" class="mt-2"></p>' +
        '</div>';

      renderRecords();

      document.getElementById('add-record').addEventListener('click', function () {
        var type = document.getElementById('record-type').value;
        var host = document.getElementById('record-host').value.trim() || '@';
        var value = document.getElementById('record-value').value.trim();

        if (!value) {
          App.showToast('请输入记录值');
          return;
        }

        state.dnsRecords.push({ type: type, host: host, value: value });
        renderRecords();
        document.getElementById('record-value').value = '';
        checkDnsComplete();
      });

      document.getElementById('propagate-dns').addEventListener('click', function () {
        var nodes = document.querySelectorAll('.dns-node');
        var status = document.getElementById('propagation-status');
        status.textContent = '解析传播中...';
        nodes.forEach(function (n) { n.classList.remove('active'); });

        var i = 0;
        var interval = setInterval(function () {
          if (i >= nodes.length) {
            clearInterval(interval);
            status.innerHTML = '<span class="status-tag success">全球解析已生效</span>';
            state.dnsPropagated = true;
            checkDnsComplete();
            return;
          }
          nodes[i].classList.add('active');
          i++;
        }, 400);
      });
    }
  });

  function renderRecords() {
    var tbody = document.querySelector('#records-table tbody');
    if (!tbody) return;
    tbody.innerHTML = state.dnsRecords.map(function (r, idx) {
      return '<tr>' +
        '<td>' + r.type + '</td>' +
        '<td>' + r.host + '</td>' +
        '<td>' + r.value + '</td>' +
        '<td><button class="btn btn-ghost delete-record" data-index="' + idx + '" style="width:auto;padding:4px 10px;">删除</button></td>' +
      '</tr>';
    }).join('');

    tbody.querySelectorAll('.delete-record').forEach(function (btn) {
      btn.addEventListener('click', function () {
        state.dnsRecords.splice(parseInt(btn.dataset.index, 10), 1);
        renderRecords();
        checkDnsComplete();
      });
    });

    var propagateBtn = document.getElementById('propagate-dns');
    if (propagateBtn) {
      propagateBtn.disabled = state.dnsRecords.length === 0;
    }
  }

  function checkDnsComplete() {
    var hasRootA = state.dnsRecords.some(function (r) {
      return r.type === 'A' && (r.host === '@' || r.host === state.domain) && r.value === state.serverIp;
    });
    var hasWww = state.dnsRecords.some(function (r) {
      return r.type === 'A' && r.host === 'www' && r.value === state.serverIp;
    });
    var correct = hasRootA && hasWww;

    if (correct && state.dnsPropagated && !App.isStepComplete(4)) {
      App.completeStep(4);
      App.addBadge('🔧 DNS 工程师');
      App.showToast('DNS 解析配置正确并已生效');
      App.showKnowledgeCard('dns');
    }
  }
})();
  </script>

      });

    document.getElementById('start-deploy').addEventListener('click', function () {
      runDeployment(state.deployMethod);
    });
  }

  function runDeployment(method) {
    var terminal = document.getElementById('deploy-terminal');
    var btn = document.getElementById('start-deploy');
    btn.disabled = true;
    terminal.innerHTML = '';

    var logs = getDeploymentLogs(method);
    var i = 0;

        clearInterval(interval);
        state.deployed = true;
        App.completeStep(5);
        App.addBadge('🚀 部署专家');
        App.showToast('网站部署成功');

      line.className = 'line ' + logs[i].type;
      line.textContent = logs[i].text;
      terminal.appendChild(line);
      terminal.scrollTop = terminal.scrollHeight;
      i++;

    var site = state.siteName || '你的网站';
    var base = [
      { text: 'Connecting to ' + state.serverIp + '...', type: 'dim' },
      { text: 'Connection established.', type: 'success' }
    ];

    if (method === 'git') {
      return base.concat([
        { text: 'git remote add origin https://git.hosting.com/user/site.git', type: 'cmd' },
        { text: 'git add .', type: 'cmd' },
        { text: 'git commit -m "Deploy: initial site"', type: 'cmd' },
        { text: 'git push origin main', type: 'cmd' },
        { text: 'Enumerating objects: 12, done.', type: 'dim' },
        { text: 'Writing objects: 100% (12/12), 1.2 KiB, done.', type: 'dim' },
        { text: 'Build started...', type: 'dim' },
        { text: 'Build completed in 8s.', type: 'success' },
        { text: 'Site "' + site + '" is now live.', type: 'success' }
      ]);
    }

    if (method === 'ftp') {
      return base.concat([
        { text: 'USER ftpuser', type: 'cmd' },
        { text: 'PASS ********', type: 'cmd' },
        { text: 'Login successful.', type: 'success' },
        { text: 'Uploading index.html...', type: 'dim' },
        { text: 'Uploading styles.css...', type: 'dim' },
        { text: 'Uploading assets...', type: 'dim' },
        { text: 'Transfer complete: 3 files, 24 KB.', type: 'success' },
        { text: 'Site "' + site + '" is now live.', type: 'success' }
      ]);
    }

    return base.concat([
      { text: 'scp -r ./site/ root@' + state.serverIp + ':/var/www/html/', type: 'cmd' },
      { text: 'index.html                           100%  1.2KB   0.2KB/s   0:00:05', type: 'dim' },
      { text: 'styles.css                           100%  3.4KB   0.6KB/s   0:00:05', type: 'dim' },
      { text: 'Restarting nginx...', type: 'dim' },
      { text: 'nginx restarted successfully.', type: 'success' },
      { text: 'Site "' + site + '" is now live.', type: 'success' }
    ]);
  }
})();
  </script>

      var sslOk = state.sslEnabled;

      if (isCorrectDomain && isHttps && dnsOk && sslOk) {
        viewport.innerHTML =
          '<div style="text-align:center;padding:40px 20px;color:' + state.siteColor + ';">' +

            '<li>✅ 网页内容正常加载：' + state.siteName + '</li>' +
            '<li>✅ 响应状态：200 OK</li>' +
          '</ul>' +
          '<button id="finish-test" class="btn btn-success mt-2">确认测试通过</button>';

        document.getElementById('finish-test').addEventListener('click', function () {
          state.tested = true;
          App.completeStep(7);
          App.addBadge('✅ 测试工程师');
          App.showToast('访问测试通过，网站已上线！');
          App.showKnowledgeCard('test');
        });
      } else {
        viewport.innerHTML =
          '<div style="text-align:center;padding:40px 20px;">' +
            '<div style="font-size:48px;margin-bottom:16px;">⚠️</div>' +
            '<h2 style="color:#dc2626;">无法访问</h2>' +
            '<p style="color:#6b7280;">请检查域名、HTTPS、DNS 和 SSL 配置。</p>' +
          '</div>';

        var issues = [];
        if (!isCorrectDomain) issues.push('地址栏中的域名与你注册的域名不一致');
        if (!isHttps) issues.push('未使用 https:// 协议');
        if (!dnsOk) issues.push('DNS 解析尚未完成传播');
        if (!sslOk) issues.push('SSL 证书未启用');

        results.innerHTML =
          '<ul style="line-height:2;color:#dc2626;">' +
            issues.map(function (i) { return '<li>❌ ' + i + '</li>'; }).join('') +
          '</ul>';

        App.showToast('测试未通过，请检查配置');
      }
    }, 1500);
  }
})();
