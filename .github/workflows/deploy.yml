name: Deploy Interactive Learning

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 修改 concurrency group，增加分支隔离，减少 artifact 残留冲突
concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  # ── GitHub Pages ──
  github-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - id: deployment
        uses: actions/deploy-pages@v4

  # ── Cloudflare Pages ──
  cloudflare-pages:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    # 确保 GitHub Pages 失败时，Cloudflare 仍然可以部署（可选，默认是并行的）
    # 如果希望 GitHub Pages 失败就全部取消，可以添加 needs: [github-pages]
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=iroqi